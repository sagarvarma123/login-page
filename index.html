<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="row">

        <!--Left sode login-->

        <div class="left-login">

            <h1 class="left-login-head">Login !</h1>
            <p class="left-login-tag-line">Login in with your account</p>

            <form>
                <input type="email" name="email" placeholder="example@gmail.com" class="input-box"> <br>
                <input type="password" name="password" placeholder="********" minlength="8" maxlength="12" class="input-box"> <br>

                <p class="forget-pas">Forget Password ?</p>

                <input type="submit" value="Login" class="login-btn">
            </form>
        </div>


        <!--Right side login-->
        <div class="right-login">
            
            <h1 class="right-login-head">Create Account</h1>
            <p class="right-login-tag-line">Start your journey with us.</p>

            <button class="signup-btn">Signup Now</button>

        </div>


    </div>

</body>
</html>
